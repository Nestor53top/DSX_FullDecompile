name: Decompile DSX Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install ilspycmd
        run: dotnet tool install -g ilspycmd

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Download binaries (if not present)
        run: |
          mkdir -p binaries
          if [ ! -f binaries/DualSenseX-Setup.zip ]; then
            echo "Downloading DualSenseX-Setup.zip..."
            curl -L -o binaries/DualSenseX-Setup.zip \
              "https://github.com/Paliverse/DualSenseX/releases/download/1.4.9/DualSenseX-Setup.zip"
          fi
          if [ ! -f binaries/ViGEmBus_Setup.exe ]; then
            echo "Downloading ViGEmBus_Setup.exe..."
            curl -L -o binaries/ViGEmBus_Setup.exe \
              "https://github.com/nefarius/ViGEmBus/releases/download/v1.22.0/ViGEmBus_1.22.0_x64_x86_arm64.exe"
          fi
          if [ ! -f binaries/HidHide_x64.exe ]; then
            echo "Downloading HidHide_x64.exe..."
            curl -L -o binaries/HidHide_x64.exe \
              "https://github.com/nefarius/HidHide/releases/download/v1.5.230.0/HidHide_1.5.230_x64.exe"
          fi
          echo "=== Binaries ready ==="
          ls -la binaries/

      - name: Download dnSpy
        run: |
          mkdir -p tools/dnSpy
          if [ ! -f tools/dnSpy/dnSpy-netframework.zip ]; then
            echo "Downloading dnSpy..."
            curl -L --retry 3 --max-time 300 -o tools/dnSpy/dnSpy-netframework.zip \
              "https://github.com/dnSpy/dnSpy/releases/download/v6.1.8/dnSpy-netframework.zip" || echo "dnSpy download failed, continuing without it"
          fi

      - name: Extract DualSenseX (Squirrel + NuGet nupkg)
        run: |
          mkdir -p extracted/dualsensex

          # Step 1: Extract outer zip
          7z x binaries/DualSenseX-Setup.zip -oextracted/dualsensex -y

          # Step 2: Extract Squirrel .exe - it's a PE with embedded zip in resources
          # Squirrel stores the nupkg in .rsrc section
          7z x extracted/dualsensex/DualSenseX-Setup.exe -oextracted/dualsensex/pe -y

          # Step 3: Find the nupkg (NuGet package) inside
          echo "=== Looking for nupkg ==="
          find extracted/ -name "*.nupkg" -o -name "*.zip" | head -20

          # The Squirrel .exe embeds a zip in its resources section
          # Try to find it by looking at all zip files inside
          find extracted/ -name "*.nupkg" | while read f; do
            echo "Found nupkg: $f"
            7z x "$f" -oextracted/dualsensex/nupkg -y
          done

          # If no nupkg found, try extracting nested zips from the PE resources
          if [ ! -d extracted/dualsensex/nupkg ]; then
            echo "No nupkg found, extracting from PE resources..."
            find extracted/dualsensex/pe -type f | while read f; do
              filetype=$(file -b "$f" 2>/dev/null)
              if echo "$filetype" | grep -qi "zip\|archive"; then
                echo "Extracting nested archive: $f"
                7z x "$f" -oextracted/dualsensex/nested -y 2>/dev/null || true
              fi
            done
          fi

          echo "=== Final extracted structure ==="
          find extracted/ -type f \( -name "*.exe" -o -name "*.dll" -o -name "*.nupkg" \) | sort

      - name: Find and extract all .NET assemblies
        run: |
          echo "=== Searching for all .dll and .exe files ==="
          find extracted/ -type f \( -name "*.dll" -o -name "*.exe" \) | sort > /tmp/all_assemblies.txt
          cat /tmp/all_assemblies.txt

          echo ""
          echo "=== Total assemblies found: $(wc -l < /tmp/all_assemblies.txt) ==="

      - name: Decompile all .NET assemblies with ilspycmd
        run: |
          total_cs=0
          while IFS= read -r assembly; do
            name=$(basename "$assembly" | sed 's/\.[^.]*$//')
            echo "--- Decompiling: $name ($assembly) ---"
            mkdir -p "decompiled/$name"
            if ilspycmd -p -o "decompiled/$name" "$assembly" 2>&1; then
              count=$(find "decompiled/$name" -name "*.cs" 2>/dev/null | wc -l)
              echo "OK: $name -> $count .cs files"
              total_cs=$((total_cs + count))
            else
              echo "FAILED: $name"
              echo "Failed to decompile" > "decompiled/$name/FAILED.txt"
            fi
          done < /tmp/all_assemblies.txt
          echo ""
          echo "=== TOTAL .cs files decompiled: $total_cs ==="

      - name: Info for ViGEmBus and HidHide (C++ drivers)
        run: |
          mkdir -p decompiled/ViGEmBus
          cat > decompiled/ViGEmBus/README.txt << 'EOF'
          ViGEmBus is a C++ Windows kernel-mode driver (WDM).
          It cannot be decompiled with ilspycmd (not .NET).
          Use Ghidra or IDA Pro for C++ decompilation.
          GitHub: https://github.com/ViGEm/ViGEmBus
          EOF

          mkdir -p decompiled/HidHide
          cat > decompiled/HidHide/README.txt << 'EOF'
          HidHide is a C++ Windows kernel-mode driver (WDF).
          It cannot be decompiled with ilspycmd (not .NET).
          Use Ghidra or IDA Pro for C++ decompilation.
          GitHub: https://github.com/ViGEm/HidHide
          EOF

      - name: Convert BAML to XAML using Baml2Xaml
        run: |
          echo "=== Cloning Baml2Xaml converter ==="
          git clone https://github.com/nuloperrito/Baml2Xaml.git tools/Baml2Xaml
          
          echo "=== Retargeting to net8.0 ==="
          sed -i 's|<TargetFramework>netcoreapp3.1</TargetFramework>|<TargetFramework>net8.0</TargetFramework>|' tools/Baml2Xaml/Baml2Xaml.csproj
          
          echo "=== Building Baml2Xaml ==="
          dotnet build tools/Baml2Xaml/Baml2Xaml.csproj -c Release
          
          echo "=== Converting all .baml files to .xaml ==="
          # Baml2Xaml reads path from Console.ReadLine(), not from args
          find decompiled/ -name "*.baml" | while read baml_file; do
            echo "Converting: $baml_file"
            echo "$baml_file" | dotnet run --no-build --project tools/Baml2Xaml/Baml2Xaml.csproj 2>&1 || echo "  FAILED: $baml_file"
          done
          
          echo "=== Results ==="
          echo "BAML files found: $(find decompiled/ -name '*.baml' | wc -l)"
          echo "XAML files created: $(find decompiled/ -name '*.xaml' | wc -l)"
          echo "=== Done ==="

      - name: Count and summarize results
        run: |
          echo "========================================"
          echo "DECOMPILATION RESULTS"
          echo "========================================"
          total=$(find decompiled/ -name "*.cs" | wc -l)
          echo "Total .cs files: $total"
          echo ""
          echo "XAML files:"
          find decompiled/ -name "*.xaml" | sort | head -20
          echo ""
          echo "By project:"
          for dir in decompiled/*/; do
            name=$(basename "$dir")
            count=$(find "$dir" -name "*.cs" 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "  $name: $count .cs files"
            fi
          done
          echo "========================================"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            count=$(find decompiled/ -name "*.cs" 2>/dev/null | wc -l)
            xaml_count=$(find decompiled/ -name "*.xaml" -o -name "*.baml" 2>/dev/null | wc -l)
            git commit -m "Auto-decompile: $(date -u +%Y-%m-%d) - $count .cs files, $xaml_count XAML/BAML files"
            git push
          fi
